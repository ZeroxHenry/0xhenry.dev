<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#darkBg)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600" letter-spacing="2">GMSL2 CONNECTION TOPOLOGY</text>

  <!-- FAIL path (top) -->
  <text x="400" y="80" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700" letter-spacing="1">FAIL</text>

  <!-- Camera (fail) -->
  <rect x="40" y="100" width="160" height="70" rx="10" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="120" y="128" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">ZED X Mini</text>
  <text x="120" y="148" text-anchor="middle" fill="#64748b" font-size="11">22-pin GMSL2</text>

  <!-- Adapter (fail) -->
  <rect x="260" y="100" width="140" height="70" rx="10" fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="330" y="128" text-anchor="middle" fill="#f87171" font-size="12" font-weight="600">22→15 Adapter</text>
  <text x="330" y="148" text-anchor="middle" fill="#64748b" font-size="11">Signal Mismatch</text>

  <!-- Board (fail) -->
  <rect x="460" y="100" width="180" height="70" rx="10" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="550" y="128" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">reComputer J4012</text>
  <text x="550" y="148" text-anchor="middle" fill="#64748b" font-size="11">15-pin CSI</text>

  <!-- Result (fail) -->
  <rect x="700" y="108" width="60" height="50" rx="8" fill="url(#redGrad)" opacity="0.15"/>
  <text x="730" y="130" text-anchor="middle" fill="#f87171" font-size="20">&#10005;</text>
  <text x="730" y="148" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">NO SIGNAL</text>

  <!-- Arrows (fail) -->
  <line x1="200" y1="135" x2="255" y2="135" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="400" y1="135" x2="455" y2="135" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="640" y1="135" x2="695" y2="135" stroke="#f87171" stroke-width="1.5"/>

  <!-- Divider -->
  <line x1="60" y1="210" x2="740" y2="210" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- SUCCESS path (bottom) -->
  <text x="400" y="240" text-anchor="middle" fill="#2dd4bf" font-size="12" font-weight="700" letter-spacing="1">SUCCESS</text>

  <!-- Camera (success) -->
  <rect x="40" y="260" width="160" height="70" rx="10" fill="none" stroke="#0d9488" stroke-width="1.5"/>
  <text x="120" y="288" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">ZED X Mini</text>
  <text x="120" y="308" text-anchor="middle" fill="#2dd4bf" font-size="11">22-pin GMSL2</text>

  <!-- Direct connection (success) -->
  <line x1="200" y1="295" x2="455" y2="295" stroke="url(#tealGrad)" stroke-width="2.5"/>
  <text x="330" y="285" text-anchor="middle" fill="#2dd4bf" font-size="11" font-weight="600">Direct 22-pin Native</text>

  <!-- Board (success) -->
  <rect x="460" y="260" width="180" height="70" rx="10" fill="none" stroke="#0d9488" stroke-width="1.5"/>
  <text x="550" y="288" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Waveshare Orin NX</text>
  <text x="550" y="308" text-anchor="middle" fill="#2dd4bf" font-size="11">22-pin CSI Native</text>

  <!-- Result (success) -->
  <rect x="700" y="268" width="60" height="50" rx="8" fill="url(#tealGrad)" opacity="0.15"/>
  <text x="730" y="293" text-anchor="middle" fill="#2dd4bf" font-size="20">&#10003;</text>
  <text x="730" y="308" text-anchor="middle" fill="#2dd4bf" font-size="9" font-weight="600">LIVE FEED</text>

  <!-- Arrow (success) -->
  <line x1="640" y1="295" x2="695" y2="295" stroke="#0d9488" stroke-width="1.5"/>

  <!-- Footer -->
  <text x="400" y="375" text-anchor="middle" fill="#475569" font-size="10">No adapter can fix a signal routing mismatch. Native 22-pin is the only path.</text>
</svg>
