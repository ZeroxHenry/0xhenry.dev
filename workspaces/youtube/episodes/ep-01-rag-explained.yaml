episode:
  id: "ep-01-rag-explained"
  title: "AI가 당신의 자료를 공부해서 완벽하게 답변하는 법 (RAG 완벽 정리)"
  topic: "Retrieval-Augmented Generation (RAG)"
  target_audience: "AI 입문자, 기업 내 AI 도입을 고민하는 실무자"
  metadata:
    duration: "약 8-10분"
    thumbnail_concept: "로봇이 산더미처럼 쌓인 문서에서 정답만 쏙 골라내는 모습. '이제 AI는 공부해서 대답합니다' 텍스트"
    tags: ["RAG", "인공지능", "ChatGPT", "Claude", "LLM", "임베디드AI", "0xHenry"]

script:
  intro:
    content: |
      (카메라를 보며 밝게 인사)
      안녕하세요, 0xHenry입니다! 여러분, 챗봇한테 질문했는데 "모르는 내용입니다"라거나 없는 말을 지어내는 '할루시네이션' 때문에 답답했던 적 없으신가요?
      오늘은 그 문제를 근본적으로 해결하고, AI가 우리 회사, 우리 개인의 데이터를 직접 공부해서 답변하게 만드는 마법 같은 기술, 'RAG'에 대해 아주 쉽게 정리해 드립니다.
    visual_notes: "Henry의 상반신 샷으로 시작. '할루시네이션' 텍스트 자막 효과."

  body:
    part_1:
      title: "RAG란 무엇인가? (오픈북 시험 비유)"
      content: |
        RAG는 Retrieval-Augmented Generation의 약자입니다. 이름은 어렵지만 '오픈북 시험'을 생각하면 쉽습니다.
        일반 AI가 머릿속 지식으로만 답을 쓴다면, RAG는 시험 도중 교과서를 펼쳐보고 가장 정확한 답을 찾아내는 능력이죠.
      visual_notes: "클로즈드북 vs 오픈북 시험을 대조하는 인포그래픽 삽입."

    part_2:
      title: "왜 RAG가 필수일까요?"
      content: |
        이유는 3가지입니다. 첫째, 최신 정보 업데이트. 둘째, 보안이 중요한 개인/기업 내부 데이터 활용. 셋째, 할루시네이션 최소화.
        학습되지 않은 데이터도 RAG만 붙이면 바로 AI의 지식이 됩니다.
      visual_notes: "3가지 장점을 타이포그래피로 강조."

    part_3:
      title: "실제 구현 사례와 미래"
      content: |
        Perplexity AI나 ChatGPT의 웹 검색이 바로 이 기술입니다. 앞으로는 로봇이나 임베디드 기기에서도 이 RAG 기술이 접목되어 진정으로 '판단'하는 기계들이 늘어날 거예요.
      visual_notes: "실제 서비스 화면 녹화본 삽입."

  outro:
    content: |
      기술은 알면 알수록 도구가 되지만, 모르면 두려움이 됩니다. 0xHenry와 함께 미래를 준비하세요!
      오늘 내용이 도움 되셨다면 구독과 좋아요 부탁드리고, 여러분이 RAG로 해결하고 싶은 문제는 무엇인지 댓글로 남겨주세요.
    visual_notes: "구독 유도 아이콘과 함께 Henry의 클로징 인사."

editor_notes:
  - "컷 편집: 설명이 길어지는 구간에 B-roll(로봇 작동 영상) 삽입"
  - "음악: 테크니컬하면서도 활기찬 느낌의 로파이 비트"
