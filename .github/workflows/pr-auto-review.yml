name: Auto Review PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    if: ${{ github.actor != 'cloudflare-workers-and-pages[bot]' && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: AI Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the PR reviewer for 0xhenry.dev (Next.js + Tailwind CSS monorepo).
            The website code lives in packages/website/.
            Review this PR and add a comment with your findings.

            Check for:
            1. Content quality (if .md files in packages/website/content/ changed):
               - Spelling/grammar issues
               - Missing frontmatter fields (title, date, description, tags)
               - Description over 160 characters
               - AI-generated feel (generic phrases, robotic tone)
            2. Code quality (if .ts/.tsx/.css files changed):
               - TypeScript errors or type safety issues
               - Mobile responsiveness concerns
               - Accessibility issues
               - Next.js App Router best practices
            3. Radar blip integrity (if content/radar/blips/ changed):
               - Valid frontmatter schema (title, date, ring, quadrant, moved, description)
               - Ring values: Adopt, Trial, Assess, Hold

            Format your review as:

            ## AI Review

            ### Summary
            (1-2 sentence overview)

            ### Issues Found
            - (list issues, or "None")

            ### Suggestions
            - (optional improvements)

            ### Verdict
            - LGTM / Needs attention / Needs fixes

            Be concise. Focus on real problems, not style nitpicks.
